# =============================================================================
# Docker Image Build & Push Workflow
# =============================================================================
# This workflow builds and pushes Docker images to GHCR
# Triggered on push to main/feat/pisky-design-kit branches or manual dispatch
# =============================================================================

name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - feat/pisky-design-kit
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================================================
  # PHASE 1: Prepare & Validate
  # ===========================================================================
  prepare:
    name: 📦 Prepare Build
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: |
          echo "🔍 Checking Dockerfile..."
          if [ ! -f "./docker/Dockerfile" ]; then
            echo "❌ Dockerfile not found!"
            exit 1
          fi
          echo "✅ Dockerfile found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'feat/pisky-design-kit' }}

      - name: Show metadata
        run: |
          echo "🏷️  Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "📋 Labels:"
          echo "${{ steps.meta.outputs.labels }}"

  # ===========================================================================
  # PHASE 2: Build & Push
  # ===========================================================================
  build-and-push:
    name: 🔨 Build & Push
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Show pushed tags
        run: |
          echo "✅ Pushed tags:"
          echo "${{ needs.prepare.outputs.tags }}" | while read tag; do
            echo "  → $tag"
          done

  # ===========================================================================
  # PHASE 3: Summary
  # ===========================================================================
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🐳 Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Prepare | ${{ needs.prepare.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build & Push | ${{ needs.build-and-push.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Tags" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.prepare.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
