services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: feedbackapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedbackapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-feedbackapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - feedbackapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedbackapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for caching, rate limiting, sessions)
  redis:
    image: redis:7-alpine
    container_name: feedbackapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - feedbackapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Database Migration Service (run once for migrations)
  migrate:
    image: node:20-alpine
    container_name: feedbackapp-migrate
    profiles:
      - migrate
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-feedbackapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-feedbackapp}
    volumes:
      - ./drizzle:/app/drizzle
      - ./db:/app/db
      - ./drizzle.config.ts:/app/drizzle.config.ts
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
    networks:
      - feedbackapp-network
    depends_on:
      postgres:
        condition: service_healthy
    command: |
      sh -c "
        apk add --no-cache python3 make g++ &&
        npm install -g pnpm@9.15.0 &&
        cd /app &&
        pnpm install --frozen-lockfile &&
        pnpm add -D drizzle-kit &&
        echo 'Running database migrations...' &&
        pnpm db:push &&
        echo '✅ Migrations completed successfully!'
      "

  # Dashboard App (Next.js)
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: feedbackapp-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-feedbackapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-feedbackapp}
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - feedbackapp-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  feedbackapp-network:
    driver: bridge
